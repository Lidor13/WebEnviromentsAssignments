<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dog.css">
    <script src="script.js"></script>
    <script src="dog.js"></script>
</head>
<body>
    <div class="container">
        <div class="hero-image-container">
            <div id="image-loader" class="image-loader"></div>
            <img id="hero-image" src="" alt="Dog Image" class="hero-image" style="display:none">
        </div>

        <div class="details-section">
            <h1 id="dog-name"></h1>
            
            <div class="info-grid">
                <div class="info-row">
                    <label>Breed:</label>
                    <span id="dog-breed"></span>
                </div>

                <div class="info-row">
                    <label>Age:</label>
                    <span id="dog-age"></span>
                </div>

                <div class="info-row">
                    <label>Gender:</label>
                    <span id="dog-gender"></span>
                </div>

                <div class="info-row">
                    <label>Vaccinated:</label>
                    <span id="dog-vaccinated"></span>
                </div>

                <div class="info-row">
                    <label>House Trained:</label>
                    <span id="dog-house-trained"></span>
                </div>

                <div class="info-row">
                    <label>Neutered:</label>
                    <span id="dog-neutered"></span>
                </div>
            </div>

            <div class="story-section">
                <h2>Story</h2>
                <p id="dog-story"></p>
            </div>

            <a id="adopt-btn" href="" class="adopt-btn">Adopt Me!</a>

            <div class="nav-buttons">
                <button id="prev-btn" class="back-button">&#8592; Prev</button>
                <a href="index.html" class="back-button">Back to List</a>
                <button id="next-btn" class="back-button">Next &#8594;</button>
            </div>
        </div>
    </div>
</body>
</html>
