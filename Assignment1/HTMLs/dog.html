<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Details</title>
    <link rel="stylesheet" href="../CSS/dog.css">
    <script src="../JS/dog.js"></script>
</head>
<body>
    <div class="container">
        <div class="hero-image-container">
            <img id="hero-image" src="" alt="Dog Image" class="hero-image">
        </div>

        <div class="details-section">
            <h1 id="dog-name"></h1>
            
            <div class="info-grid">
                <div class="info-row">
                    <label>Breed:</label>
                    <span id="dog-breed"></span>
                </div>

                <div class="info-row">
                    <label>Age:</label>
                    <span id="dog-age"></span>
                </div>

                <div class="info-row">
                    <label>Gender:</label>
                    <span id="dog-gender"></span>
                </div>

                <div class="info-row">
                    <label>Vaccinated:</label>
                    <span id="dog-vaccinated"></span>
                </div>

                <div class="info-row">
                    <label>House Trained:</label>
                    <span id="dog-house-trained"></span>
                </div>

                <div class="info-row">
                    <label>Neutered:</label>
                    <span id="dog-neutered"></span>
                </div>
            </div>

            <div class="story-section">
                <h2>Story</h2>
                <p id="dog-story"></p>
            </div>

            <button class="back-button" onclick="history.back()">Back to Dogs</button>
        </div>
    </div>
</body>
</html>
